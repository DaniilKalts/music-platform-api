adminTracks:
  post:
    tags: ["Администрирование 🛠"]
    summary: Добавить трек
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            properties:
              title:
                type: string
              artist_name:
                type: string
              album_name:
                type: string
              genre_id:
                type: string
                format: uuid
              duration_seconds:
                type: integer
              file:
                type: string
                format: binary
            required: [title, artist_name, album_name, genre_id, duration_seconds, file]
    responses:
      '201':
        description: Трек загружен
        content:
          application/json:
            schema:
              $ref: '../components/schemas/track.yaml#/TrackResponse'

adminTrackByID:
  put:
    tags: ["Администрирование 🛠"]
    summary: Обновить трек
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/admin.yaml#/UpdateTrackRequest'
    responses:
      '200':
        description: Трек обновлён
        content:
          application/json:
            schema:
              $ref: '../components/schemas/track.yaml#/TrackResponse'
  delete:
    tags: ["Администрирование 🛠"]
    summary: Удалить трек (soft delete)
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '204':
        description: Удалено

userSubscription:
  patch:
    tags: ["Администрирование 🛠"]
    summary: Изменить подписку пользователя
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/admin.yaml#/UpdateSubscriptionRequest'
    responses:
      '200':
        description: Подписка обновлена
        content:
          application/json:
            schema:
              $ref: '../components/schemas/user.yaml#/UserResponse'
