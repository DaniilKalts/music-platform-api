CreatePlaylistRequest:
  type: object
  required: [name]
  properties:
    name:
      type: string
    description:
      type: string

UpdatePlaylistRequest:
  type: object
  required: [name]
  properties:
    name:
      type: string
    description:
      type: string

PlaylistResponse:
  type: object
  properties:
    id:
      type: string
      format: uuid
    user_id:
      type: string
      format: uuid
    name:
      type: string
    description:
      type: string
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time
