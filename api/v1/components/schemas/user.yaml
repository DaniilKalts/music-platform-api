UserResponse:
  type: object
  properties:
    id:
      type: string
      format: uuid
    email:
      type: string
    username:
      type: string
    role:
      type: string
      enum: [USER, ADMIN]
    subscription_type:
      type: string
      enum: [FREE, PREMIUM]
    created_at:
      type: string
      format: date-time

UpdateUserRequest:
  type: object
  properties:
    email:
      type: string
      format: email
    username:
      type: string
      minLength: 3
