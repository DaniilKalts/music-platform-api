services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-8080}:${APP_PORT:-8080}"
    environment:
      - APP_PORT=${APP_PORT:-8080}
      - DB_HOST=postgres
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_NAME=${DB_NAME:-music_platform}
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT:-6379}
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET:-access-secret-change-me}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-refresh-secret-change-me}
      - S3_ENDPOINT=rustfs:9000
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-admin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-password}
      - S3_BUCKET=${S3_BUCKET:-tracks}
      - S3_USE_SSL=false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - music-net

  postgres:
    image: postgres:18-alpine
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=${DB_NAME:-music_platform}
    ports:
      - "127.0.0.1:${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - music-net

  redis:
    image: redis:8.0-alpine
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - music-net

  rustfs:
    image: rustfs/rustfs:latest
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      - RUSTFS_ACCESS_KEY=${S3_ACCESS_KEY:-admin}
      - RUSTFS_SECRET_KEY=${S3_SECRET_KEY:-password}
      - RUSTFS_CONSOLE_ENABLE=true
    command: server /data
    volumes:
      - rustfs_data:/data
    networks:
      - music-net

networks:
  music-net:
    driver: bridge

volumes:
  postgres_data:
  rustfs_data:
